<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Command Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-logo">⬡</span>
        <span class="topbar-title">DevOps <strong>CMD</strong> Reference</span>
      </div>
      <div class="topbar-right">
        <input type="text" id="search-input" placeholder="Search commands…" autocomplete="off" />
        <span class="topbar-hint">Press <kbd>/</kbd> to focus</span>
      </div>
    </header>

    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-inner">
          <nav id="sidebar-nav">
            <p class="sidebar-loading">Loading…</p>
          </nav>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="content" id="content">
        <div class="welcome" id="welcome-screen">
          <div class="welcome-icon">$_</div>
          <h1>DevOps Command Reference</h1>
          <p>Select a category from the sidebar to explore commands.<br/>Use <kbd>/</kbd> to search across all commands.</p>
          <div class="welcome-tags" id="welcome-tags"></div>
        </div>
        <div id="command-view" class="hidden"></div>
        <div id="search-results" class="hidden"></div>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
